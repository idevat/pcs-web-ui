#     - make prevent_dev_mistakes

distcheck:
  extends: .parallel
  stage: stage1
  script:
    - dnf install -y autoconf automake pkgconf-pkg-config bzip2
    - ./autogen.sh
    - ./configure
    - make distcheck
    - rename --verbose .tar. ".${BASE_IMAGE_NAME}.tar." pcs-web-ui*.tar.*
    - mkdir -p dist && cp -v pcs-web-ui*.tar.* dist/
  artifacts:
    expire_in: 1 week
    paths:
      - dist

rpm_build:
  extends: .parallel
  stage: stage1
  script:
    #
    #
    # Install current version of pcs
    # to determine location for pcs-web-ui location (via pkg-conf).
    #
    # https://docs.gitlab.com/ee/api/job_artifacts.html#download-the-artifacts-archive
    - >
        curl \
          --fail-with-body \
          --location \
          --insecure \
          --output artifacts.zip \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${PCS_ARTIFACTS_URL}"
    - unzip artifacts.zip
    - dnf install -y rpms/pcs-*.rpm
    - rm -rf rpms/ artifacts.zip
    #
    #
    # Create pcs-web-ui rpm installable to pcsd
    # Unlike in pcs, there is no CI_BRANCH environment variable. In pcs,
    # CI_BRANCH helps a user to differentiate between rpm for e.g. fedora and
    # RHEL. Webui is running inside a browser and currently does not matter what
    # OS is used.
    #
    - dnf install -y autoconf automake pkgconf-pkg-config bzip2 rpm-build
    - ./autogen.sh
    - ./configure --with-pcsd-webui-dir=/usr/lib64/pcsd/public
    - make rpm/pcs-web-ui.spec
    - dnf builddep -y rpm/pcs-web-ui.spec
    - rpmbuild --version
    - make rpm
    - >
      mkdir -p rpms
      &&
      cp -v $(find rpm  -type f -name '*.rpm' -not -name '*.src.rpm') rpms
  artifacts:
    expire_in: 1 week
    paths:
      - rpms

